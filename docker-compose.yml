services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: azion
      POSTGRES_PASSWORD: azion
      POSTGRES_DB: azion
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/azionpassword
    ports:
      - "7474:7474"
      - "7687:7687"
